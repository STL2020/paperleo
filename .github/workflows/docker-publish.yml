name: Docker Build & Publish

on:
  push:
    tags:
      - 'v*'           # Trigger bei Tags wie v5.1.0
  workflow_dispatch:    # Manuell auslösbar

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/PaperlessAiCore.Api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          body: |
            ## 🦁 paperLeo ${{ github.ref_name }}

            ### Docker
            ```bash
            docker pull ghcr.io/stl2020/paperleo:${{ github.ref_name }}
            ```

            ### docker-compose.yml
            ```yaml
            services:
              paperleo:
                image: ghcr.io/stl2020/paperleo:${{ github.ref_name }}
                ports:
                  - "5080:8080"
                volumes:
                  - ./data:/app/data
                restart: unless-stopped
            ```

            👉 **[Pro-Lizenz kaufen](https://payhip.com/b/4auSd)** — Einmalzahlung, kein Abo

            📖 **[Benutzerhandbuch](https://github.com/STL2020/paperleo/wiki)**
