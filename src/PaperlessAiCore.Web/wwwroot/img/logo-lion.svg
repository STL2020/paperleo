<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="97" fill="#0b1c2a"/>
  <circle cx="100" cy="100" r="96" fill="none" stroke="#2a8878" stroke-width="2"/>
  <circle cx="100" cy="100" r="90" fill="none" stroke="#1a4a42" stroke-width="0.6"/>

  <!-- MANE — 9 overlapping petals fanning from top, symmetric -->
  <!-- Each petal: pointed leaf shape, rotated around top of head (100,58) -->
  <g transform="translate(100,62)">
    <!-- Outer ring of longer mane strands -->
    <g transform="rotate(-80) translate(0,-46)"><ellipse cx="0" cy="0" rx="9" ry="26" fill="#0d2535" stroke="#1a4050" stroke-width="0.8"/></g>
    <g transform="rotate(-60) translate(0,-48)"><ellipse cx="0" cy="0" rx="9" ry="28" fill="#0f2838" stroke="#1a4050" stroke-width="0.8"/></g>
    <g transform="rotate(-40) translate(0,-50)"><ellipse cx="0" cy="0" rx="9" ry="30" fill="#102a3c" stroke="#1a4555" stroke-width="0.8"/></g>
    <g transform="rotate(-20) translate(0,-52)"><ellipse cx="0" cy="0" rx="9" ry="32" fill="#122c3e" stroke="#1a4555" stroke-width="0.8"/></g>
    <g transform="rotate(0)   translate(0,-54)"><ellipse cx="0" cy="0" rx="9" ry="34" fill="#142e42" stroke="#1d5060" stroke-width="0.8"/></g>
    <g transform="rotate(20)  translate(0,-52)"><ellipse cx="0" cy="0" rx="9" ry="32" fill="#122c3e" stroke="#1a4555" stroke-width="0.8"/></g>
    <g transform="rotate(40)  translate(0,-50)"><ellipse cx="0" cy="0" rx="9" ry="30" fill="#102a3c" stroke="#1a4555" stroke-width="0.8"/></g>
    <g transform="rotate(60)  translate(0,-48)"><ellipse cx="0" cy="0" rx="9" ry="28" fill="#0f2838" stroke="#1a4050" stroke-width="0.8"/></g>
    <g transform="rotate(80)  translate(0,-46)"><ellipse cx="0" cy="0" rx="9" ry="26" fill="#0d2535" stroke="#1a4050" stroke-width="0.8"/></g>
    <!-- Inner ring of shorter mane strands, lighter for depth -->
    <g transform="rotate(-70) translate(0,-36)"><ellipse cx="0" cy="0" rx="7" ry="20" fill="#162e42" stroke="#1d5060" stroke-width="0.6"/></g>
    <g transform="rotate(-50) translate(0,-38)"><ellipse cx="0" cy="0" rx="7" ry="22" fill="#183244" stroke="#1d5060" stroke-width="0.6"/></g>
    <g transform="rotate(-30) translate(0,-40)"><ellipse cx="0" cy="0" rx="7" ry="24" fill="#1a3448" stroke="#205060" stroke-width="0.6"/></g>
    <g transform="rotate(-10) translate(0,-42)"><ellipse cx="0" cy="0" rx="7" ry="26" fill="#1c3648" stroke="#205060" stroke-width="0.6"/></g>
    <g transform="rotate(10)  translate(0,-42)"><ellipse cx="0" cy="0" rx="7" ry="26" fill="#1c3648" stroke="#205060" stroke-width="0.6"/></g>
    <g transform="rotate(30)  translate(0,-40)"><ellipse cx="0" cy="0" rx="7" ry="24" fill="#1a3448" stroke="#205060" stroke-width="0.6"/></g>
    <g transform="rotate(50)  translate(0,-38)"><ellipse cx="0" cy="0" rx="7" ry="22" fill="#183244" stroke="#1d5060" stroke-width="0.6"/></g>
    <g transform="rotate(70)  translate(0,-36)"><ellipse cx="0" cy="0" rx="7" ry="20" fill="#162e42" stroke="#1d5060" stroke-width="0.6"/></g>
  </g>

  <!-- FACE — geometric pentagon shape -->
  <path d="M 100 68 C 124 68 140 82 142 100 C 144 118 134 136 118 144 L 100 150 L 82 144 C 66 136 56 118 58 100 C 60 82 76 68 100 68 Z"
        fill="#0f2535"/>

  <!-- Forehead ridge / brow line -->
  <path d="M 74 82 C 80 76 92 73 100 73 C 108 73 120 76 126 82"
        fill="none" stroke="#1d6a5a" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Left brow -->
  <path d="M 72 88 C 76 83 82 82 87 84"
        fill="none" stroke="#1d7a6a" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Right brow -->
  <path d="M 128 88 C 124 83 118 82 113 84"
        fill="none" stroke="#1d7a6a" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Left eye socket -->
  <path d="M 71 98 C 73 92 80 90 86 94 C 88 98 86 104 80 105 C 74 105 70 102 71 98 Z"
        fill="#0a1e2e" stroke="#1d6a5a" stroke-width="0.8"/>
  <!-- Right eye socket -->
  <path d="M 129 98 C 127 92 120 90 114 94 C 112 98 114 104 120 105 C 126 105 130 102 129 98 Z"
        fill="#0a1e2e" stroke="#1d6a5a" stroke-width="0.8"/>

  <!-- Left eye iris -->
  <ellipse cx="79" cy="97" rx="4" ry="5" fill="#1d9e75"/>
  <!-- Right eye iris -->
  <ellipse cx="121" cy="97" rx="4" ry="5" fill="#1d9e75"/>
  <!-- Left pupil -->
  <ellipse cx="79" cy="97" rx="2" ry="3" fill="#0b1c29"/>
  <!-- Right pupil -->
  <ellipse cx="121" cy="97" rx="2" ry="3" fill="#0b1c29"/>
  <!-- Eye shine -->
  <circle cx="80.5" cy="95.5" r="1" fill="#5dcaa5" opacity="0.7"/>
  <circle cx="122.5" cy="95.5" r="1" fill="#5dcaa5" opacity="0.7"/>

  <!-- Cheekbone lines -->
  <path d="M 70 106 C 68 112 70 118 74 122" stroke="#1a4050" stroke-width="0.8" fill="none"/>
  <path d="M 130 106 C 132 112 130 118 126 122" stroke="#1a4050" stroke-width="0.8" fill="none"/>

  <!-- Nose bridge -->
  <path d="M 97 107 L 100 103 L 103 107" fill="none" stroke="#1d6a5a" stroke-width="1"/>

  <!-- Nose -->
  <path d="M 92 114 C 94 110 100 108 106 110 L 108 114 C 106 116 100 117 94 116 Z"
        fill="#1d9e75" opacity="0.8"/>
  <!-- Nose line -->
  <path d="M 100 117 L 100 121" stroke="#1a4050" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Mouth lines -->
  <path d="M 100 121 C 96 124 90 126 87 124"
        fill="none" stroke="#1a4555" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M 100 121 C 104 124 110 126 113 124"
        fill="none" stroke="#1a4555" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Muzzle area - two subtle bumps -->
  <ellipse cx="88" cy="118" rx="8" ry="6" fill="#0d2030" opacity="0.4"/>
  <ellipse cx="112" cy="118" rx="8" ry="6" fill="#0d2030" opacity="0.4"/>

  <!-- Chin point -->
  <path d="M 88 140 C 92 146 100 150 100 150 C 100 150 108 146 112 140"
        fill="none" stroke="#1a3a48" stroke-width="0.8"/>

  <!-- Whisker lines - very subtle -->
  <line x1="62" y1="116" x2="84" y2="119" stroke="#1a3a48" stroke-width="0.6" opacity="0.5"/>
  <line x1="62" y1="121" x2="84" y2="122" stroke="#1a3a48" stroke-width="0.6" opacity="0.5"/>
  <line x1="138" y1="116" x2="116" y2="119" stroke="#1a3a48" stroke-width="0.6" opacity="0.5"/>
  <line x1="138" y1="121" x2="116" y2="122" stroke="#1a3a48" stroke-width="0.6" opacity="0.5"/>
</svg>
